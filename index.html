<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>istoctoptancim.com</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
overflow-x:hidden;
}

/* ANA ALAN */

.container{
width:100%;
max-width:1920px;
margin:auto;
padding:8px;
}

/* TÜM GÖRSELLER */

img{
width:100%;
height:auto;
display:block;
border-radius:22px;
}

/* BOŞLUK */

.section{
margin-bottom:14px;
}

/* MOBİL DÜZEN */

@media screen and (max-width:768px){

.container{
padding:5px;
}

img{
border-radius:14px;
}

.section{
margin-bottom:10px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- SLIDER -->

<div class="section">

<img src="slider.png" alt="Slider">

</div>

<!-- MOBİL APP -->

<div class="section">

<img src="mobil.png" alt="Mobil">

</div>

<!-- KATEGORİLER -->

<div class="section">

<img src="kategori.png" alt="Kategori">

</div>

<!-- TANITIM -->

<div class="section">

<img src="tanıtım.png" alt="Tanıtım">

</div>

<!-- FOOTER -->

<div class="section">

<img src="foter.png" alt="Footer">

</div>

</div>

</body>
</html>
