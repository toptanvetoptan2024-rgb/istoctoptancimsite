<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f3f3f3;
  overflow-x:hidden;
}

.container{
  width:100%;
  max-width:1920px;
  margin:auto;
  padding:8px;
}

.section{
  margin-bottom:14px;
  position:relative;
}

img{
  width:100%;
  height:auto;
  display:block;
  border-radius:22px;
}

.whatsapp-fixed{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:9999;
  background:#25D366;
  color:white;
  padding:15px 20px;
  border-radius:50px;
  font-size:17px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.cta-bar{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  display:none;
  z-index:9998;
  background:white;
  padding:8px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.15);
  gap:8px;
}

.cta-bar a{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:white;
  font-weight:bold;
  padding:13px 6px;
  border-radius:12px;
  font-size:14px;
}

.cta-whatsapp{
  background:#25D366;
}

.cta-call{
  background:#111;
}

@media screen and (max-width:768px){
  .container{
    padding:5px;
    padding-bottom:75px;
  }

  img{
    border-radius:14px;
  }

  .section{
    margin-bottom:10px;
  }

  .whatsapp-fixed{
    display:none;
  }

  .cta-bar{
    display:flex;
  }
}
</style>
</head>

<body>
