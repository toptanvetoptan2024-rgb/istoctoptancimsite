<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>İstoç Toptancım | Toptan Alışveriş</title>
<meta name="description" content="İstoç Toptancım ile toptan ürünleri inceleyin, WhatsApp üzerinden hızlı teklif alın.">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f3f3f3;
  overflow-x:hidden;
}

.container{
  width:100%;
  max-width:1920px;
  margin:0 auto;
  padding:8px;
  padding-bottom:20px;
}

.section{
  width:100%;
  margin-bottom:14px;
}

.section img{
  width:100%;
  height:auto;
  display:block;
  border-radius:22px;
}

/* MASAÜSTÜ WHATSAPP BUTONU */
.whatsapp-fixed{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:9999;
  background:#25D366;
  color:white;
  padding:15px 22px;
  border-radius:50px;
  font-size:17px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

/* MOBİL ALT SABİT BAR */
.mobile-cta{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  display:none;
  z-index:9999;
  background:#ffffff;
  padding:8px;
  gap:8px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.18);
}

.mobile-cta a{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:white;
  font-weight:bold;
  padding:13px 6px;
  border-radius:12px;
  font-size:14px;
}

.whatsapp-btn{
  background:#25D366;
}

.call-btn{
  background:#111111;
}

/* MOBİL DÜZEN */
@media screen and (max-width:768px){

  body{
    background:#f3f3f3;
  }

  .container{
    padding:5px;
    padding-bottom:78px;
  }

  .section{
    margin-bottom:10px;
  }

  .section img{
    border-radius:14px;
    width:100%;
    height:auto;
  }

  .whatsapp-fixed{
    display:none;
  }

  .mobile-cta{
    display:flex;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- SLIDER -->
  <div class="section">
    <img src="slider.png" alt="İstoç Toptancım Toptan Alışveriş">
  </div>

  <!-- MOBİL APP -->
  <div class="section">
    <img src="mobil.png" alt="Mobil Uygulama ile Toptan Sipariş">
  </div>

  <!-- KATEGORİLER -->
  <div class="section">
    <img src="kategori.png" alt="Toptan Ürün Kategorileri">
  </div>

  <!-- TANITIM -->
  <div class="section">
    <img src="tanitim.png" alt="İstoç Toptancım Tanıtım">
  </div>

  <!-- FOOTER -->
  <div class="section">
    <img src="foter.png" alt="İletişim Bilgileri">
  </div>

</div>

<!-- MASAÜSTÜ WHATSAPP -->
<a class="whatsapp-fixed"
   href="https://wa.me/905300316127?text=Merhaba,%20İstoç%20Toptancım%20hakkında%20bilgi%20almak%20istiyorum."
   target="_blank">
  WhatsApp Teklif Al
</a>

<!-- MOBİL ALT BUTONLAR -->
<div class="mobile-cta">
  <a class="whatsapp-btn"
     href="https://wa.me/905300316127?text=Merhaba,%20İstoç%20Toptancım%20hakkında%20bilgi%20almak%20istiyorum."
     target="_blank">
    WhatsApp
  </a>

  <a class="call-btn" href="tel:+905300316127">
    Hemen Ara
  </a>
</div>

</body>
</html>
