<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
overflow-x:hidden;
}

/* ANA ALAN */

.container{
width:100%;
max-width:1920px;
margin:auto;
padding:8px;
padding-bottom:90px;
}

/* TÜM BLOKLAR */

.section{
margin-bottom:14px;
width:100%;
}

/* TÜM GÖRSELLER */

.section img{
width:100%;
height:auto;
display:block;
border-radius:22px;
}

/* MASAÜSTÜ WHATSAPP */

.whatsapp-fixed{
position:fixed;
right:18px;
bottom:18px;
background:#25D366;
color:white;
padding:16px 24px;
border-radius:50px;
text-decoration:none;
font-size:17px;
font-weight:bold;
z-index:9999;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

/* MOBİL ALT BAR */

.mobile-bar{
position:fixed;
left:0;
bottom:0;
width:100%;
background:#fff;
padding:8px;
display:none;
gap:8px;
z-index:9999;
box-shadow:0 -5px 20px rgba(0,0,0,0.18);
}

.mobile-bar a{
flex:1;
text-align:center;
text-decoration:none;
padding:14px 5px;
border-radius:12px;
font-size:14px;
font-weight:bold;
color:white;
}

.wp-btn{
background:#25D366;
}

.call-btn{
background:#111;
}

/* MOBİL */

@media screen and (max-width:768px){

.container{
padding:5px;
padding-bottom:80px;
}

.section{
margin-bottom:10px;
}

.section img{
border-radius:14px;
}

.whatsapp-fixed{
display:none;
}

.mobile-bar{
display:flex;
}

}

</style>
</head>
